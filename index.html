<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tools-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tool-button {
            background: white;
            border-radius: 30px;
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2d3748;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tool-button:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .tool-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .tool-name {
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .tool-button {
                width: 160px;
                height: 160px;
            }

            .tool-icon {
                font-size: 60px;
            }

            .tool-name {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Operations Toolkit</h1>
    </div>

    <div class="tools-container">
        <a href="tools/lead-time-calculator.html" class="tool-button">
            <div class="tool-icon">⏱️</div>
            <div class="tool-name">Lead Time</div>
        </a>

        <a href="tools/safety-stock-calculator.html" class="tool-button">
            <div class="tool-icon">📦</div>
            <div class="tool-name">Safety Stock</div>
        </a>
    </div>
</body>
</html>
