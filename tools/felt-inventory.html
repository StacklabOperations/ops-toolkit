<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STACKABL — Live Felt Inventory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

  body {
    background: #000;
    color: #BFBFBF;
    min-height: 100vh;
  }

  /* ── STACKABL SVG watermark — tiled at 45° ────────────────────
     Visible in the margin gutter around the tile grid            */
  body::before {
    content: '';
    position: fixed;
    top: -100%;
    left: -100%;
    width: 300%;
    height: 300%;
    background-image: url('STACKABL_Stacked_White.svg');
    background-size: 520px 293px;
    background-repeat: repeat;
    transform: rotate(45deg);
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ───────────────────────────────────────────────────
     Dominant over the tile grid — strong visual hierarchy        */
  .header {
    position: relative;
    z-index: 1;
    background: #000;
    padding: 32px 36px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 36px;
    flex-wrap: wrap;
  }

  /* Brand lockup — larger, dominant over the data */
  .header-brand {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #BFBFBF;
    line-height: 1.5;
    white-space: nowrap;
  }
  .header-brand span {
    display: block;
    font-weight: 400;
    color: #BFBFBF;
    letter-spacing: 0.18em;
    font-size: 0.75rem;
  }

  .header-divider { width: 1px; height: 52px; background: #1e1e1e; flex-shrink: 0; }

  /* Stat blocks — all 10% grey, closer in size */
  .header-stat { display: flex; flex-direction: column; gap: 4px; }
  .header-stat-label {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #BFBFBF;
  }
  .header-stat-val {
    font-size: 1.1rem;
    font-weight: 700;
    color: #E6E6E6;
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .header-stat-val small {
    font-size: 0.75rem;
    font-weight: 400;
    color: #BFBFBF;
    margin-left: 5px;
    letter-spacing: 0.06em;
  }
  .header-stat-sub {
    font-size: 0.75rem;
    color: #BFBFBF;
    letter-spacing: 0.04em;
  }

  .header-meta {
    margin-left: auto;
    font-size: 0.75rem;
    color: #BFBFBF;
    text-align: right;
    line-height: 2;
    letter-spacing: 0.04em;
  }

  /* = and OR operators between header sections */
  .header-operator {
    font-size: 1.6rem;
    font-weight: 200;
    color: #333;
    letter-spacing: 0.08em;
    flex-shrink: 0;
    align-self: center;
  }

  /* REFRESH — Option B: all-caps text button */
  .refresh-btn {
    background: transparent;
    border: 1px solid #222;
    color: #DDDDDD;
    border-radius: 2px;
    padding: 8px 16px;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .refresh-btn:hover { border-color: #666; color: #DDDDDD; background: #0a0a0a; }

  /* ── Splash screen — always shows on load, fades out when data ready ── */
  @keyframes splashFadeOut {
    from { opacity: 1; }
    to   { opacity: 0; pointer-events: none; }
  }
  .config {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    transition: opacity 0.6s ease;
  }
  .config.fade-out {
    animation: splashFadeOut 0.6s ease forwards;
  }
  .splash-logo { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .splash-logo svg { width: 360px; height: auto; opacity: 0.92; }
  .splash-subtitle {
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #BFBFBF;
  }
  /* Pulsing loading dots */
  .splash-loading { display: flex; gap: 7px; align-items: center; height: 18px; }
  .splash-loading span {
    width: 5px; height: 5px; border-radius: 50%; background: #444;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .splash-loading span:nth-child(2) { animation-delay: 0.2s; }
  .splash-loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { background: #333; transform: scale(0.8); }
    40%           { background: #BFBFBF; transform: scale(1); }
  }
  /* Fallback token input — hidden by default, shown only if no token found */
  .splash-token { display: none; flex-direction: column; align-items: center; gap: 10px; }
  .splash-token.visible { display: flex; }
  .splash-token-row { display: flex; gap: 10px; }
  .config input {
    background: #0d0d0d; border: 1px solid #2a2a2a; color: #BFBFBF;
    border-radius: 2px; padding: 11px 16px; font-size: 0.85rem;
    width: 300px; font-family: inherit;
  }
  .config input:focus { outline: none; border-color: #555; }
  .load-btn {
    background: #BFBFBF; color: #000; border: none; border-radius: 2px;
    padding: 11px 24px; font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; font-family: inherit;
  }
  .load-btn:hover { background: #ddd; }
  .config-note { font-size: 0.6rem; color: #333; letter-spacing: 0.04em; text-align: center; }

  /* ── Tile grid — gutter exposes the SVG watermark ───────────
     16px padding around the grid = visible watermark margin      */
  #output {
    position: relative;
    z-index: 1;
    padding: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
  }

  /* ── Individual tile ─────────────────────────────────────────
     Typography follows Material Design 3 card hierarchy:
     Title Large 22px / Body 16px / Label 12px               */
  .card {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3 / 4;
    background: #111;
  }
  .card-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left bottom;
    display: block;
  }

  /* Scrim: fades from transparent to solid black at the bottom */
  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 90px 20px 20px;
    background: linear-gradient(
      transparent 0%,
      rgba(0,0,0,0.7) 45%,
      rgba(0,0,0,0.96) 70%,
      #000 100%
    );
    color: #BFBFBF;
  }

  /* Two-size type scale — mirrors the header exactly:
     1.1rem bold = dominant value  |  0.75rem = everything else
     One colour throughout: #BFBFBF                              */

  .card-sqft {
    font-size: 1.1rem;
    font-weight: 700;
    color: #E6E6E6;
    margin-bottom: 8px;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .card-pn {
    font-size: 0.75rem;
    font-weight: 400;
    color: #BFBFBF;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  /* Disc row — mirrors header layout with "or" separator */
  .card-disc-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .card-or {
    font-size: 0.75rem;
    font-weight: 200;
    color: #BFBFBF;
    opacity: 0.5;
    margin: 3px 0;
    letter-spacing: 0.08em;
  }
  .card-label {
    font-size: 0.85rem;
    font-weight: 400;
    color: #BFBFBF;
    letter-spacing: 0.03em;
  }
  .card-inches {
    font-size: 0.85rem;
    font-weight: 400;
    color: #BFBFBF;
  }
  .card-inches span {
    font-size: 0.85rem;
    font-weight: 400;
    color: #BFBFBF;
    margin-left: 2px;
  }
  .thickness-badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    color: #BFBFBF;
    padding: 0;
    margin-top: 4px;
  }

  /* ── States ────────────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 120px 20px;
    color: #2a2a2a;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .error { color: #7f1d1d; text-align: center; padding: 60px 20px; font-size: 0.85rem; line-height: 1.8; }
</style>
</head>
<body>

<!-- Header — shown after data loads -->
<div class="header" id="header" style="display:none">
  <div class="header-brand">STACKABL<span>Live Felt Inventory</span></div>
  <div class="header-divider"></div>
  <div class="header-stat" id="statSqft"></div>
  <div class="header-operator">=</div>
  <div class="header-stat" id="stat5"></div>
  <div class="header-operator">or</div>
  <div class="header-stat" id="stat8"></div>
  <div class="header-meta" id="headerMeta"></div>
  <button class="refresh-btn" onclick="manualRefresh()">Refresh</button>
</div>

<!-- Splash — always shown on load, fades out when data is ready -->
<div class="config" id="configPanel">
  <div class="splash-logo">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <style>.st0{fill:#FFFFFF;}</style>

        <path class="st0" d="M818.54,450.93c-29.58,0-48.19-9.45-50.47-32.33h31.57c2.14,8.54,15.62,9.91,25.23,9.91c12.2,0,19.38-3.05,19.38-10.22v-1.52c0-6.1-4.9-8.69-16.03-9.15l-21.25-0.46c-26.23-0.91-38.27-9.76-38.27-30.35v-0.76c0-23.03,14.79-34.92,46.05-34.92h8.13c28.97,0,47.27,12.05,49.25,33.7h-31.57c-2.14-8.54-10.23-11.28-20.3-11.28c-11.44,0-22.77,0.04-22.77,10.22v0.61c0,6.4,4.75,9,15.88,9.3l21.25,0.61c26.23,0.91,38.28,9.76,38.28,30.35v1.07c0,25.16-17.38,35.23-47.73,35.23H818.54z"/>

      </g>
    </svg>
    <div class="splash-subtitle">Live Felt Inventory</div>
  </div>
  <div class="splash-loading" id="splashDots">
    <span></span><span></span><span></span>
  </div>
  <div class="splash-token" id="splashToken">
    <div class="splash-token-row">
      <input type="password" id="apiToken" placeholder="Paste your Aligni API token" />
      <button class="load-btn" onclick="loadData()">Load</button>
    </div>
    <p class="config-note">Token is used only to query Aligni's API and is never stored elsewhere.</p>
  </div>
</div>

<div id="output"><div class="loading">Connecting to Aligni…</div></div>

<script>
// ── FilzFelt swatch images — hosted locally in tools/swatches/ folder ─────────
// Images are named by 3-digit code: swatches/023.jpg, swatches/116.jpg, etc.
// No dependency on FilzFelt's servers.
function getSwatchUrl(code) { return `../assets/swatches/${code}.jpg`; }

// ── Config ────────────────────────────────────────────────────────────────────
const ENDPOINT = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? '/api/graphql'
  : 'https://stackabl-aligni-proxy.operations-dae.workers.dev';

const EXCLUDE_PN         = '100464';
const SQFT_PER_BOLT_YARD = 17.49;
const DISC5_SQFT         = 0.252;
const DISC8_SQFT         = 0.570;
const THICKNESS_3MM      = 3.0;
const THICKNESS_5MM      = 4.8;

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcLinearInches(sqft, discSqft, thicknessMm) {
  if (!sqft || sqft <= 0 || !thicknessMm || thicknessMm <= 0) return 0;
  return (sqft / discSqft) * thicknessMm / 25.4;
}
function fmt(val) {
  if (val == null) return '—';
  return val.toLocaleString('en-US', { maximumFractionDigits: 1 });
}
function makeQuery(cursor) {
  const after = cursor ? `, after: "${cursor}"` : '';
  return `{
  parts(first: 100${after}) {
    pageInfo { hasNextPage endCursor }
    nodes {
      id partNumber manufacturerPn
      partType { name }
      unit { name }
      customParameters { nodes { name value } }
      inventoryUnits { nodes { quantity } }
    }
  }
}`;
}

// ── Fetch all pages ───────────────────────────────────────────────────────────
async function fetchAllParts(token) {
  const allNodes = [];
  let cursor = null, page = 1;
  do {
    document.getElementById('output').innerHTML =
      `<div class="loading">Loading from Aligni… page ${page}</div>`;
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: IS_LOCAL
        ? { 'Content-Type': 'application/json', 'Authorization': `Token ${token}` }
        : { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: makeQuery(cursor) })
    });
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    const { nodes, pageInfo } = json.data.parts;
    allNodes.push(...nodes);
    cursor = pageInfo.hasNextPage ? pageInfo.endCursor : null;
    page++;
  } while (cursor);
  return allNodes;
}

function hideSplash() {
  const panel = document.getElementById('configPanel');
  panel.classList.add('fade-out');
  setTimeout(() => { panel.style.display = 'none'; }, 650);
}

function showTokenInput() {
  document.getElementById('splashDots').style.display = 'none';
  document.getElementById('splashToken').classList.add('visible');
}

// ── Main load ─────────────────────────────────────────────────────────────────
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

async function loadData() {
  const token = document.getElementById('apiToken').value.trim();
  // On GitHub Pages the Cloudflare Worker handles auth — no token needed in browser
  if (!token && IS_LOCAL) { showTokenInput(); return; }

  document.getElementById('splashDots').style.display = 'flex';
  document.getElementById('splashToken').classList.remove('visible');
  document.getElementById('header').style.display = 'none';
  document.getElementById('output').innerHTML = '';

  try {
    const allNodes = await fetchAllParts(token);

    const parts = allNodes
      .filter(p => p.partType?.name === 'Felt')
      .filter(p => p.partNumber !== EXCLUDE_PN && p.manufacturerPn !== EXCLUDE_PN);

    if (parts.length === 0) {
      showTokenInput();
      document.getElementById('output').innerHTML =
        '<div class="loading">No felt parts found. Check your token and that the part type is "Felt".</div>';
      return;
    }

    // Build cards
    const cards = parts.map(p => {
      const params      = p.customParameters?.nodes || [];
      const thicknessMm = parseFloat(params.find(cp => cp.name === 'Thickness (mm)')?.value) || null;
      const colourName  = params.find(cp => cp.name === 'Colour/Sheen')?.value || null;
      const displayName = p.manufacturerPn || p.partNumber;
      const totalSqft   = (p.inventoryUnits?.nodes || [])
        .reduce((s, u) => s + (parseFloat(u.quantity) || 0), 0) * SQFT_PER_BOLT_YARD;
      const in5 = thicknessMm ? calcLinearInches(totalSqft, DISC5_SQFT, thicknessMm) : null;
      const in8 = thicknessMm ? calcLinearInches(totalSqft, DISC8_SQFT, thicknessMm) : null;
      const mpnMatch    = (p.manufacturerPn || '').match(/FT-(\d{3})/i);
      const ffCode      = mpnMatch ? mpnMatch[1] : null;
      return {
        name: displayName, pn: p.partNumber, sqft: totalSqft,
        thicknessMm, in5, in8, colourName, ffCode,
        swatchLocal:  ffCode ? `swatches/${ffCode}.jpg` : null,
        swatchRemote: ffCode ? getSwatchUrl(ffCode) : null,
      };
    }).filter(c => c.sqft > 0);

    cards.sort((a, b) => (a.colourName || a.name).localeCompare(b.colourName || b.name));

    // Header stats
    const t53 = cards.filter(c=>c.thicknessMm===THICKNESS_3MM).reduce((s,c)=>s+(c.in5||0),0);
    const t55 = cards.filter(c=>c.thicknessMm&&c.thicknessMm!==THICKNESS_3MM).reduce((s,c)=>s+(c.in5||0),0);
    const t83 = cards.filter(c=>c.thicknessMm===THICKNESS_3MM).reduce((s,c)=>s+(c.in8||0),0);
    const t85 = cards.filter(c=>c.thicknessMm&&c.thicknessMm!==THICKNESS_3MM).reduce((s,c)=>s+(c.in8||0),0);

    const sqft3 = cards.filter(c=>c.thicknessMm===THICKNESS_3MM).reduce((s,c)=>s+c.sqft,0);
    const sqft5 = cards.filter(c=>c.thicknessMm&&c.thicknessMm!==THICKNESS_3MM).reduce((s,c)=>s+c.sqft,0);

    document.getElementById('statSqft').innerHTML = `
      <div class="header-stat-label">Total Inventory</div>
      <div class="header-stat-val">${fmt(sqft3)}<small>sqft @ 3mm</small></div>
      <div class="header-stat-val">${fmt(sqft5)}<small>sqft @ 5mm</small></div>`;

    const fix5 = Math.floor((t53+t55) / 48);
    const fix8 = Math.floor((t83+t85) / 48);

    document.getElementById('stat5').innerHTML = `
      <div class="header-stat-label">All Colours — @5in Disc</div>
      <div class="header-stat-val">${fmt(t53+t55)}<small>Linear Inches</small></div>
      <div class="header-stat-sub">~${fmt(fix5)} × 48in length fixtures</div>`;

    document.getElementById('stat8').innerHTML = `
      <div class="header-stat-label">All Colours — @8in Disc</div>
      <div class="header-stat-val">${fmt(t83+t85)}<small>Linear Inches</small></div>
      <div class="header-stat-sub">~${fmt(fix8)} × 48in length fixtures</div>`;

    document.getElementById('headerMeta').innerHTML =
      `${cards.length} colours in stock<br>Last loaded: ${new Date().toLocaleString()}`;
    document.getElementById('header').style.display = 'flex';

    // Render tiles
    const grid = document.createElement('div');
    grid.className = 'grid';

    for (const c of cards) {
      const card = document.createElement('div');
      card.className = 'card';
      const imgTag = c.swatchLocal
        ? `<img class="card-bg" src="${c.swatchLocal}" alt="${c.colourName||c.name}"
               onerror="this.src='${c.swatchRemote}';this.onerror=null">`
        : `<div class="card-bg" style="background:#1a1a1a"></div>`;

      card.innerHTML = `
        ${imgTag}
        <div class="card-info">
          <div class="card-pn" style="justify-content:space-between"><span>${c.pn} · ${c.name}</span><span>${c.thicknessMm ? (c.thicknessMm===THICKNESS_3MM?'3MM':'5MM') : ''}</span></div>
          <div class="card-sqft">${fmt(c.sqft)} sqft on hand</div>
          ${!c.thicknessMm
            ? '<div style="font-size:0.75rem;color:rgba(255,100,100,0.7)">⚠ No thickness set</div>'
            : `<div class="card-disc-row">
                   <span class="card-label">@5in disc</span>
                   <span class="card-inches">${fmt(c.in5)}<span> Linear Inches</span></span>
               </div>
               <div class="card-or">or</div>
               <div class="card-disc-row">
                   <span class="card-label">@8in disc</span>
                   <span class="card-inches">${fmt(c.in8)}<span> Linear Inches</span></span>
               </div>`
          }
        </div>`;
      grid.appendChild(card);
    }

    document.getElementById('header').style.display = 'flex';
    document.getElementById('output').innerHTML = '';
    document.getElementById('output').appendChild(grid);
    hideSplash();

  } catch (err) {
    showTokenInput();
    document.getElementById('output').innerHTML =
      `<div class="error">Error: ${err.message}<br><br>
       If this is a CORS error, make sure the local proxy is running:<br>
       <code style="font-size:0.78rem;color:#555">node server.js</code></div>`;
  }
}

function manualRefresh() {
  const panel = document.getElementById('configPanel');
  panel.style.display = 'flex';
  panel.classList.remove('fade-out');
  document.getElementById('splashDots').style.display = 'flex';
  document.getElementById('splashToken').classList.remove('visible');
  document.getElementById('header').style.display = 'none';
  loadData();
}

// ── Auto-load on open ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  let token = '';
  try {
    const res = await fetch('/api/token');
    if (res.ok) {
      const data = await res.json();
      if (data.token && data.token !== 'PASTE_YOUR_TOKEN_HERE') token = data.token;
    }
  } catch(e) {}

  if (token) {
    document.getElementById('apiToken').value = token;
    loadData();
  } else if (!IS_LOCAL) {
    // On GitHub Pages — no token needed, Cloudflare Worker handles auth
    loadData();
  } else {
    showTokenInput();
  }
});
</script>
</body>
</html>
