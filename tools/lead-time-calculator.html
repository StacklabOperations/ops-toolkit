<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Time Calculator - Operations Toolkit</title>
    <link rel="stylesheet" href="../assets/css/shared-styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            color: #2d3748;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
            font-size: 0.95em;
        }
        
        input[type="date"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input[type="range"] {
            width: 100%;
            margin: 8px 0;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #718096;
        }
        
        .calculate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .calculate-btn:active {
            transform: translateY(0);
        }
        
        .results {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .results-header h3 {
            color: #2d3748;
            font-size: 1em;
        }
        
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f3f4f6;
            border: none;
            color: #4a5568;
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .copy-btn:hover {
            color: #2d3748;
            background-color: #e5e7eb;
        }
        
        .email-output {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #1f2937;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="header">
            📅 Lead Time Calculator
        </div>
        
        <div class="form-group">
            <label for="dfaDate">Start Date</label>
            <input type="date" id="dfaDate">
        </div>
        
        <div class="form-group">
            <label for="leadTime">Lead Time: <span id="leadTimeValue">10</span> weeks</label>
            <input type="range" id="leadTime" min="4" max="18" value="10">
            <div class="range-labels">
                <span>4 weeks</span>
                <span>18 weeks</span>
            </div>
        </div>
        
        <button class="calculate-btn" onclick="calculateDates()">
            Calculate Dates
        </button>
        
        <div id="results" class="results hidden">
            <div class="results-header">
                <h3>Generated Email:</h3>
                <button class="copy-btn" onclick="copyToClipboard()">
                    📋 Copy to Clipboard
                </button>
            </div>
            <div id="emailOutput" class="email-output"></div>
        </div>
    </div>

    <script src="../assets/js/nav.js"></script>
    <script>
        // Initialize navigation
        createToolkitNav('lead-time');

        // Set up date range and defaults
        const today = new Date();
        const dfaDateInput = document.getElementById('dfaDate');
        const leadTimeInput = document.getElementById('leadTime');
        const leadTimeValue = document.getElementById('leadTimeValue');
        const results = document.getElementById('results');
        const emailOutput = document.getElementById('emailOutput');

        // Set default date to today (no constraints)
        dfaDateInput.value = today.toISOString().split('T')[0];

        // Update lead time display
        leadTimeInput.addEventListener('input', function() {
            leadTimeValue.textContent = this.value;
        });

        // Date calculation functions
        function isWeekend(date) {
            const day = date.getDay();
            return day === 0 || day === 6;
        }

        function addBusinessDays(date, days) {
            let currentDate = new Date(date);
            let addedDays = 0;
            
            while (addedDays < days) {
                currentDate.setDate(currentDate.getDate() + 1);
                if (!isWeekend(currentDate)) {
                    addedDays++;
                }
            }
            
            while (isWeekend(currentDate)) {
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            return currentDate;
        }

        function subtractBusinessDays(date, days) {
            let currentDate = new Date(date);
            let subtractedDays = 0;
            
            while (subtractedDays < days) {
                currentDate.setDate(currentDate.getDate() - 1);
                if (!isWeekend(currentDate)) {
                    subtractedDays++;
                }
            }
            
            while (isWeekend(currentDate)) {
                currentDate.setDate(currentDate.getDate() - 1);
            }
            
            return currentDate;
        }

        function formatDate(date) {
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function calculateDates() {
            const selectedDate = new Date(dfaDateInput.value);
            const leadTimeWeeks = parseInt(leadTimeInput.value);
            
            const shippingDate = addBusinessDays(selectedDate, leadTimeWeeks * 5);
            const balanceInvoiceDate = subtractBusinessDays(shippingDate, 6 * 5);
            const balancePaymentDueDate = subtractBusinessDays(shippingDate, 10);

            const emailText = `Confirming we have received the DFA.

Important dates for your order:
- Shipping Date: ${formatDate(shippingDate)}
- Balance Invoice Send Date: ${formatDate(balanceInvoiceDate)} (6 weeks prior to shipping)
- Balance Payment Due Date: ${formatDate(balancePaymentDueDate)} (10 days prior to shipping)

Best Regards,
Jordan`;

            emailOutput.textContent = emailText;
            results.classList.remove('hidden');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(emailOutput.textContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
